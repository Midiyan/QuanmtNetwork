<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>QUANMT NETWORK</title>
</head>
<body style="margin: 0; background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif;">

    <!-- Üst Navigasyon -->
    <div style="display: flex; justify-content: center; gap: 40px; padding: 25px; background-color: #0a0a0a; border-bottom: 1px solid #222;">
        <span style="cursor: pointer; color: #ccc;">Anasayfa</span>
        <span style="cursor: pointer; color: #ccc;">Mağaza</span>
        <span style="cursor: pointer; color: #ccc;">Yardım</span>
        <span style="cursor: pointer; color: #0088ff; font-weight: bold;">Giriş Yap</span>
    </div>

    <!-- Ana Banner Alanı -->
    <div style="display: flex; max-width: 1100px; margin: 50px auto; gap: 20px; height: 250px;">
        <!-- Sol Panel -->
        <div style="flex: 3; background-color: #111; border: 1px solid #222; border-radius: 8px; padding: 40px;">
            <h1 style="margin: 0;">QUANMT NETWORK</h1>
            <p style="color: #888; margin-top: 10px;">Topluluğumuza katılmak için lütfen giriş yapın veya kayıt olun.</p>
            <div style="margin-top: 25px;">
                <button style="background: #0088ff; border: none; color: white; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: bold;">Giriş Yap</button>
                <button style="background: #222; border: none; color: white; padding: 12px 30px; border-radius: 4px; cursor: pointer; margin-left: 10px;">Kayıt Ol</button>
            </div>
        </div>
        <!-- Sağ Mağaza Kutusu -->
        <div style="flex: 1; background: linear-gradient(180deg, #0088ff, #0055aa); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;">
            <h2 style="margin: 0;">MAĞAZA</h2>
            <p>Alışverişe Başla</p>
        </div>
    </div>

    <!-- Ürün Grid Sistemi -->
    <div style="max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
        <!-- Örnek bir kutu yapısı -->
        <div style="background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center;">
            <h3 style="margin: 0;">VIP</h3>
            <p style="color: #0088ff; font-weight: bold; margin: 15px 0;">20 TL</p>
            <button style="width: 100%; background: #222; color: white; border: none; padding: 10px; cursor: pointer;">Satın Al</button>
        </div>
        <div style="background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center;">
            <h3 style="margin: 0;">VIP+</h3>
            <p style="color: #0088ff; font-weight: bold; margin: 15px 0;">40 TL</p>
            <button style="width: 100%; background: #222; color: white; border: none; padding: 10px; cursor: pointer;">Satın Al</button>
        </div>
        <div style="background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center;">
            <h3 style="margin: 0;">QVIP</h3>
            <p style="color: #0088ff; font-weight: bold; margin: 15px 0;">100 TL</p>
            <button style="width: 100%; background: #222; color: white; border: none; padding: 10px; cursor: pointer;">Satın Al</button>
        </div>
        <div style="background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center;">
            <h3 style="margin: 0;">KASA</h3>
            <p style="color: #0088ff; font-weight: bold; margin: 15px 0;">15 TL</p>
            <button style="width: 100%; background: #222; color: white; border: none; padding: 10px; cursor: pointer;">Satın Al</button>
        </div>
    </div>

</body>
</html>
