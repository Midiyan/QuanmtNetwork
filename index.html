<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>QuanmtNetwork | Giriş & Kayıt</title>
    <style>
        /* Tasarım */
        .auth-card { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 20px; border: 1px solid #00ff88; color: white; width: 350px; text-align: center; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; }
        .btn-auth { background: #00ff88; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; border-radius: 5px; font-weight: bold; }
        #captcha-display { font-size: 1.5rem; letter-spacing: 5px; font-weight: bold; color: #8a2be2; margin: 10px; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="landing" style="display:flex; justify-content:center; align-items:center; height:100vh;">
        <div class="auth-card" id="auth-box">
            <h2 id="auth-title">QUANMT NETWORK</h2>
            
            <!-- Başlangıç Butonları -->
            <div id="start-btns">
                <button class="btn-auth" onclick="showForm('login')">Giriş Yap</button>
                <button class="btn-auth" onclick="showForm('register')">Kayıt Ol</button>
            </div>

            <!-- Formlar -->
            <div id="form-area" style="display:none;">
                <input type="text" id="reg-name" placeholder="İsim">
                <input type="email" id="reg-email" placeholder="Gmail">
                <input type="password" id="reg-pass" placeholder="Şifre">
                <input type="password" id="reg-pass-conf" placeholder="Şifre (Tekrar)">
                
                <div id="captcha-display"></div>
                <input type="text" id="captcha-input" placeholder="Captcha Gir">
                
                <button class="btn-auth" onclick="handleAuth()">Tamamla</button>
                <button class="btn-auth" onclick="location.reload()">Geri</button>
            </div>
        </div>
    </div>

    <!-- ANA SİTE -->
    <div id="main-site" style="display:none; text-align:center; padding:50px; color:white;">
        <h1 id="welcome-msg"></h1>
        <button onclick="localStorage.clear(); location.reload()">Çıkış Yap</button>
    </div>

    <script>
        let currentMode = '';
        let generatedCaptcha = '';

        function showForm(mode) {
            currentMode = mode;
            document.getElementById('start-btns').style.display = 'none';
            document.getElementById('form-area').style.display = 'block';
            if(mode === 'register') {
                generateCaptcha();
            }
        }

        function generateCaptcha() {
            generatedCaptcha = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('captcha-display').innerText = generatedCaptcha;
        }

        function handleAuth() {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const passConf = document.getElementById('reg-pass-conf').value;
            const captcha = document.getElementById('captcha-input').value;

            if(currentMode === 'register') {
                if(pass !== passConf) return alert("Şifreler uyuşmuyor!");
                if(captcha !== generatedCaptcha) return alert("Captcha hatalı!");
                
                localStorage.setItem('user_name', name);
                alert("Kayıt başarılı!");
            }
            
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Hoş geldin, " + localStorage.getItem('user_name');
        }

        if(localStorage.getItem('user_name')) showDashboard();
    </script>
</body>
</html>
