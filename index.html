<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap | QuanmtNetwork</title>
    <style>
        /* Giriş Ekranı Tasarımı */
        #auth-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #050508; z-index: 9999; display: flex; 
            justify-content: center; align-items: center; 
        }
        .auth-card { 
            background: #111; padding: 30px; border-radius: 15px; 
            border: 1px solid #333; text-align: center; color: white; width: 300px; 
        }
        .auth-input { 
            width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; 
            border: 1px solid #444; background: #000; color: white; 
        }
        .auth-btn { 
            background: #00ff88; border: none; padding: 10px 20px; 
            cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; 
        }

        /* Ana Site (Başlangıçta gizli) */
        #main-site { display: none; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2>GİRİŞ YAP</h2>
            <input type="text" id="username" class="auth-input" placeholder="Kullanıcı Adı">
            <input type="password" id="password" class="auth-input" placeholder="Şifre">
            <button class="auth-btn" onclick="checkLogin()">Giriş Yap</button>
        </div>
    </div>

    <!-- SENİN KODUN BURAYA GELECEK -->
    <div id="main-site">
        
        <!-- KENDİ KODLARINI BURAYA YAPIŞTIR -->

    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            if(user) {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
            }
        }

        // Sayfa yenilenirse giriş kontrolü
        if(localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
        }
    </script>
</body>
</html>
