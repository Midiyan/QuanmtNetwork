<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>QUANMT NETWORK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00a8ff; --bg: #121212; --card: rgba(255,255,255,0.05); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        
        /* Navigasyon */
        nav { display: flex; justify-content: center; gap: 30px; padding: 20px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-bottom: 1px solid #333; }
        nav a { cursor: pointer; font-weight: bold; color: #ddd; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        /* Ana İçerik Kartı */
        .hero-banner { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 15px; border: 1px solid #333; margin: 20px auto; width: 80%; display: flex; align-items: center; justify-content: space-between; }
        .btn-blue { background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Mağaza Kartları */
        .container { display: flex; gap: 20px; padding: 20px; justify-content: center; flex-wrap: wrap; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; width: 200px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .price { color: var(--primary); font-weight: bold; margin: 10px 0; font-size: 1.2em; }
    </style>
</head>
<body>

<nav>
    <a onclick="showTab('anasayfa')"><i class="fa-solid fa-house"></i> Anasayfa</a>
    <a onclick="showTab('magaza')"><i class="fa-solid fa-basket-shopping"></i> Mağaza</a>
    <a><i class="fa-solid fa-circle-question"></i> Yardım</a>
    <a><i class="fa-solid fa-headset"></i> Destek</a>
    <a style="color:var(--primary)"><i class="fa-solid fa-right-to-bracket"></i> Giriş Yap</a>
</nav>

<div id="anasayfa" class="tab-content">
    <div class="hero-banner">
        <div>
            <h2>QUANMT NETWORK</h2>
            <p>Topluluğumuza katılmak için lütfen giriş yapın veya kayıt olun.</p>
            <button class="btn-blue">Giriş Yap</button>
            <button style="background:transparent; color:white; border:1px solid #555; padding:10px 20px; cursor:pointer;">Kayıt Ol</button>
        </div>
        <div style="text-align:center; background:var(--primary); padding:20px; border-radius:10px;">
            <h3>MAĞAZA</h3>
            <p>Alışverişe Başla!</p>
        </div>
    </div>
</div>

<div id="magaza" class="tab-content" style="display:none;">
    <h2 style="text-align:center;">VIP Paketleri</h2>
    <div class="container">
        <!-- Buraya paketlerini ekle -->
        <div class="card"><h3>VIP</h3><div class="price">20 ₺</div><button class="btn-blue">Satın Al</button></div>
        <div class="card"><h3>VIP+</h3><div class="price">40 ₺</div><button class="btn-blue">Satın Al</button></div>
    </div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
