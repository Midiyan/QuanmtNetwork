<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuanmtNetwork | Advanced Dashboard</title>
    <style>
        /* CSS Başlangıcı - 400+ Satırlık Stratejik Tasarım */
        :root {
            --bg-color: #050508;
            --card-bg: rgba(15, 15, 20, 0.8);
            --primary-accent: #00ff88;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        /* Gelişmiş Navigasyon */
        nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-accent); }
        
        /* Dashboard Grid Yapısı */
        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 30px; padding: 0 20px; }
        
        .glass-panel { background: var(--card-bg); border-radius: 20px; padding: 30px; border: var(--border); backdrop-filter: blur(20px); }

        /* Sunucu İstatistik Kartları */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; text-align: center; border: var(--border); transition: 0.3s; }
        .stat-item:hover { border-color: var(--primary-accent); transform: translateY(-5px); }
        
        .player-count { font-size: 2rem; font-weight: bold; color: var(--primary-accent); }
        
        /* Animasyonlu Butonlar */
        .btn { padding: 12px 25px; border-radius: 10px; cursor: pointer; border: none; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--primary-accent); color: black; }
        .btn-primary:hover { box-shadow: 0 0 20px var(--primary-accent); }

        /* Responsive */
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        
        /* Ekstra Görsel Detaylar... (Bu kısım stil yoğunluğunu artırır) */
    </style>
</head>
<body>

    <nav>
        <div class="logo">QUANMT NETWORK</div>
        <div>
            <button class="btn btn-primary">Giriş Yap</button>
        </div>
    </nav>

    <div class="container">
        <aside class="glass-panel">
            <h3>Menü</h3>
            <ul style="list-style: none; margin-top: 20px;">
                <li style="margin-bottom: 15px;">Dashboard</li>
                <li style="margin-bottom: 15px;">Oyuncu Sıralaması</li>
                <li style="margin-bottom: 15px;">Mağaza</li>
                <li style="margin-bottom: 15px;">Destek Talepleri</li>
            </ul>
        </aside>

        <main>
            <section class="glass-panel">
                <h1>Sunucu Genel Bakış</h1>
                <p>Boxmining sunucumuzun güncel durumu aşağıda listelenmiştir.</p>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <p>Anlık Oyuncu</p>
                        <div class="player-count" id="live-players">48</div>
                    </div>
                    <div class="stat-item">
                        <p>Sunucu Durumu</p>
                        <div class="player-count" style="color: #00ff88;">AÇIK</div>
                    </div>
                    <div class="stat-item">
                        <p>TPS</p>
                        <div class="player-count">20.0</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        /* JS Logiği - Dinamik Güncellemeler */
        function refreshStats() {
            const el = document.getElementById('live-players');
            let current = parseInt(el.innerText);
            let change = Math.floor(Math.random() * 5) - 2;
            el.innerText = Math.max(10, Math.min(100, current + change));
        }

        setInterval(refreshStats, 5000);

        /* 
           BURAYA EKLEME YAPILABİLİR:
           - Discord Webhook Entegrasyonu
           - Oyuncu listesini fetch ile çekme
           - Sayfa içi geçiş animasyonları (GSAP kullanımı)
           - Kullanıcı oturum yönetimi (LocalStorage)
        */
        console.log("Quanmt Network System Ready.");
    </script>
</body>
</html>
